<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0a0b10;        /* Глибокий чорний як у мінувальника */
            --bg-panel: #161922;       /* Темно-сірий для карток */
            --accent-yellow: #f1b32d;  /* Твій фірмовий жовтий */
            --text-main: #ffffff;
            --text-muted: #626d7a;
            --win-color: #2ecc71;
            --lose-color: #e74c3c;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Exo 2', sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* Історія матчів */
        .history-bar {
            width: 100%; max-width: 400px;
            display: flex; gap: 6px;
            justify-content: center;
            margin-bottom: 15px;
            height: 28px;
        }
        .hist-chip {
            padding: 4px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 800;
            background: var(--bg-panel);
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.3s ease;
        }
        .hist-win { color: var(--win-color); border-color: var(--win-color); }
        .hist-lose { color: var(--lose-color); border-color: var(--lose-color); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Шапка */
        .stats-header {
            width: 100%; max-width: 400px;
            display: flex; justify-content: space-between;
            background: var(--bg-panel); padding: 14px 18px;
            border-radius: 12px; margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }
        .stat-group { display: flex; flex-direction: column; }
        .stat-label { color: var(--text-muted); font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-size: 22px; font-weight: 900; }
        .yellow-text { color: var(--accent-yellow); }

        /* Ігрова зона з колесом */
        .game-container {
            position: relative; width: 280px; height: 280px;
            margin: 10px 0 30px 0;
        }

        .wheel-base {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #1c202b 0%, #11141b 100%);
            border: 6px solid #1e222d;
            position: relative; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        #sector-visual {
            position: absolute; width: 100%; height: 100%;
            background: conic-gradient(var(--accent-yellow) 0deg, transparent 0deg);
            opacity: 0.15;
        }

        #arrow-pivot {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            transition: transform 3.8s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .arrow-indicator {
            position: absolute; top: -12px; left: 50%;
            transform: translateX(-50%);
            width: 24px; height: 32px;
            background: var(--accent-yellow);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            filter: drop-shadow(0 0 8px rgba(241, 179, 45, 0.6));
        }

        .center-info {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 110px; height: 110px;
            background: var(--bg-panel);
            border: 4px solid #252a36;
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 11;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Кнопки та ввід */
        .ui-controls { width: 100%; max-width: 400px; }
        .chance-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        
        .btn-opt {
            background: var(--bg-panel); border: 1px solid #2d323e;
            color: var(--text-muted); padding: 14px; border-radius: 10px;
            font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-opt.active { border-color: var(--accent-yellow); color: var(--accent-yellow); background: rgba(241, 179, 45, 0.05); }

        .bet-box {
            background: var(--bg-panel); border-radius: 12px;
            padding: 16px; margin-bottom: 20px; text-align: center;
            border: 1px solid rgba(255,255,255,0.03);
        }
        input {
            background: transparent; border: none; color: white;
            font-size: 28px; font-weight: 900; width: 100%; outline: none;
            text-align: center; font-family: 'Exo 2', sans-serif;
        }

        .btn-main {
            width: 100%; background: var(--accent-yellow);
            border: none; padding: 22px; border-radius: 14px;
            color: #000; font-size: 19px; font-weight: 900;
            text-transform: uppercase; cursor: pointer;
            box-shadow: 0 4px 0 #b38000; transition: 0.1s;
        }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 1px 0 #b38000; }
        .btn-main:disabled { background: #333; color: #666; box-shadow: none; transform: none; }

        #msg-display { font-weight: 800; height: 24px; margin-top: -15px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="history-bar" id="history-container">
        </div>

    <div class="stats-header">
        <div class="stat-group">
            <span class="stat-label">Ваш баланс</span>
            <span class="stat-val yellow-text" id="ui-bal">0 ₴</span>
        </div>
        <div class="stat-group" style="text-align: right;">
            <span class="stat-label">Можливий приз</span>
            <span class="stat-val" id="ui-prize" style="color: var(--win-color);">0 ₴</span>
        </div>
    </div>

    <div class="game-container">
        <div class="wheel-base">
            <div id="sector-visual"></div>
        </div>
        <div id="arrow-pivot">
            <div class="arrow-indicator"></div>
        </div>
        <div class="center-info">
            <div id="info-percent" style="font-size: 30px; font-weight: 900; color: var(--accent-yellow);">50%</div>
            <div class="stat-label" style="font-size: 8px;">шанс виграшу</div>
        </div>
    </div>

    <div id="msg-display"></div>

    <div class="ui-controls">
        <div class="chance-row">
            <button class="btn-opt" onclick="changeChance(25, this)">25%</button>
            <button class="btn-opt active" onclick="changeChance(50, this)">50%</button>
            <button class="btn-opt" onclick="changeChance(75, this)">75%</button>
        </div>

        <div class="bet-box">
            <input type="number" id="input-bet" value="100" oninput="calcPrize()">
        </div>

        <button class="btn-main" id="btn-spin" onclick="startSpin()">Покращити</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseInt(localStorage.getItem('total_balance')) || 1000;
        let activeChance = 0.5;
        let isSpinning = false;
        let rotationState = 0;
        let history = [];

        function updateUI() {
            document.getElementById('ui-bal').innerText = balance + " ₴";
            localStorage.setItem('total_balance', balance);
            
            const deg = activeChance * 360;
            document.getElementById('sector-visual').style.background = 
                `conic-gradient(var(--accent-yellow) 0deg ${deg}deg, transparent ${deg}deg 360deg)`;
            
            document.getElementById('info-percent').innerText = (activeChance * 100) + "%";
            calcPrize();
        }

        function calcPrize() {
            const bet = parseInt(document.getElementById('input-bet').value) || 0;
            const prize = Math.floor(bet * (1 / activeChance) * 0.95);
            document.getElementById('ui-prize').innerText = prize + " ₴";
        }

        function changeChance(val, btn) {
            if(isSpinning) return;
            activeChance = val / 100;
            document.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateHistory(win) {
            const container = document.getElementById('history-container');
            const chip = document.createElement('div');
            chip.className = `hist-chip ${win ? 'hist-win' : 'hist-lose'}`;
            chip.innerText = win ? 'WIN' : 'LOSE';
            
            container.prepend(chip);
            if(container.children.length > 6) container.lastChild.remove();
        }

        function startSpin() {
            const bet = parseInt(document.getElementById('input-bet').value);
            if(bet > balance || bet <= 0 || isSpinning) return;

            balance -= bet;
            isSpinning = true;
            document.getElementById('btn-spin').disabled = true;
            document.getElementById('msg-display').innerText = "";
            updateUI();

            const win = Math.random() < activeChance;
            const pivot = document.getElementById('arrow-pivot');
            
            // Розрахунок точки зупинки стрілки
            let stopAt;
            if(win) {
                stopAt = Math.random() * (activeChance * 360 * 0.95);
            } else {
                stopAt = (activeChance * 360) + (Math.random() * (360 - activeChance * 360) * 0.95);
            }

            const spinRotation = rotationState + (360 * 6) + stopAt;
            rotationState = spinRotation;
            
            pivot.style.transform = `rotate(${spinRotation}deg)`;
            tg.HapticFeedback.impactOccurred('medium');

            setTimeout(() => {
                isSpinning = false;
                document.getElementById('btn-spin').disabled = false;
                
                if(win) {
                    const prize = Math.floor(bet * (1 / activeChance) * 0.95);
                    balance += prize;
                    document.getElementById('msg-display').innerText = "Успіх! + " + prize + " ₴";
                    document.getElementById('msg-display').style.color = "var(--win-color)";
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    document.getElementById('msg-display').innerText = "Програш";
                    document.getElementById('msg-display').style.color = "var(--lose-color)";
                    tg.HapticFeedback.notificationOccurred('error');
                }
                updateHistory(win);
                updateUI();
            }, 3850);
        }

        updateUI();
    </script>
</body>
</html>
