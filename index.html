<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cb-bg: #0e121b;
            --cb-panel: #161b28;
            --cb-accent: #ffb700; /* Золото Case-Battle */
            --cb-blue: #2c71ff;
            --cb-text: #8b95a5;
        }

        body {
            background-color: var(--cb-bg);
            color: white;
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Шапка в стилі Case-Battle */
        .header-stats {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            background: var(--cb-panel);
            padding: 15px;
            border-radius: 12px;
            border-bottom: 3px solid var(--cb-accent);
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .stat-box { display: flex; flex-direction: column; }
        .stat-label { color: var(--cb-text); font-size: 10px; text-transform: uppercase; font-weight: 700; }
        .stat-value { font-size: 20px; font-weight: 900; color: white; }
        .balance-num { color: var(--cb-accent); }

        /* Ігрова зона */
        .main-card {
            width: 100%;
            max-width: 400px;
            background: var(--cb-panel);
            border-radius: 16px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .upgrade-slots {
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
            margin-bottom: 25px;
        }

        .slot {
            width: 100px;
            height: 100px;
            background: #1c2331;
            border-radius: 12px;
            border: 2px solid #283044;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .slot::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 4px;
            background: var(--cb-blue);
        }

        .slot img { width: 80%; filter: drop-shadow(0 0 10px rgba(44, 113, 255, 0.5)); }

        /* Кнопки вибору шансу */
        .chance-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .c-btn {
            background: #1c2331;
            border: 1px solid #283044;
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
        }

        .c-btn.active {
            border-color: var(--cb-accent);
            color: var(--cb-accent);
            background: rgba(255, 183, 0, 0.05);
        }

        /* Поле вводу */
        .bet-input-container {
            background: #0e121b;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #283044;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            text-align: center;
            font-size: 22px;
            font-weight: 900;
            outline: none;
        }

        /* Головна кнопка */
        .btn-upgrade {
            width: 100%;
            background: linear-gradient(180deg, #ffca43 0%, #ffb700 100%);
            border: none;
            padding: 18px;
            border-radius: 12px;
            color: #4e3800;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 0 #b38000;
        }

        .btn-upgrade:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b38000;
        }

        .loading-ring {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--cb-accent);
            border-radius: 50%;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .anim-spin { display: block; animation: spin 0.8s linear infinite; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="stat-box">
            <span class="stat-label">Мій баланс</span>
            <span class="stat-value balance-num" id="user_balance">0</span>
        </div>
        <div class="stat-box" style="text-align: right;">
            <span class="stat-label">Шанс</span>
            <span class="stat-value" id="current_chance">50%</span>
        </div>
    </div>

    <div class="main-card">
        <h2 style="font-size: 16px; color: var(--cb-text); margin-top: 0;">GLOBAL UPGRADE</h2>
        
        <div class="upgrade-slots">
            <div class="slot"><img src="https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhjx2jJemkV09-5lpKKqPrxN7LEmyVQ7MEpiO_E57P5gVO8v11rNWD6LITAdgY9M13W-VS6k-vvgZ_v75jMmyE26ygh4X6InhK-n1gSOat_sh_V"></div>
            <div style="font-size: 24px; color: var(--cb-accent);">⚡</div>
            <div class="slot" id="result-slot"><span style="font-size: 30px; opacity: 0.2;">?</span></div>
        </div>

        <div class="chance-selector">
            <button class="c-btn" onclick="updateChance(25, this)">25%</button>
            <button class="c-btn active" onclick="updateChance(50, this)">50%</button>
            <button class="c-btn" onclick="updateChance(75, this)">75%</button>
        </div>

        <div class="bet-input-container">
            <input type="number" id="bet_amount" value="100">
        </div>

        <div id="loader" class="loading-ring"></div>
        <button id="main-btn" class="btn-upgrade" onclick="startUpgrade()">Покращити</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // СИНХРОНІЗАЦІЯ: використовуємо один і той самий ключ 'total_balance' для обох ігор
        let balance = parseInt(localStorage.getItem('total_balance')) || 1000;
        let activeChance = 0.5;

        function updateUI() {
            document.getElementById('user_balance').innerText = balance + " ₴";
            localStorage.setItem('total_balance', balance);
        }

        function updateChance(val, el) {
            activeChance = val / 100;
            document.getElementById('current_chance').innerText = val + "%";
            document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function startUpgrade() {
            let bet = parseInt(document.getElementById('bet_amount').value);
            
            if (bet > balance || bet <= 0) {
                alert("Недостатньо грошей!");
                return;
            }

            balance -= bet;
            updateUI();

            const btn = document.getElementById('main-btn');
            const loader = document.getElementById('loader');
            btn.style.display = 'none';
            loader.classList.add('anim-spin');

            setTimeout(() => {
                loader.classList.remove('anim-spin');
                btn.style.display = 'block';
                
                let win = Math.random() < activeChance;
                if (win) {
                    let winAmount = Math.floor(bet * (1 / activeChance) * 0.95);
                    balance += winAmount;
                    tg.HapticFeedback.notificationOccurred('success');
                    document.getElementById('result-slot').style.borderColor = "#00ff00";
                } else {
                    tg.HapticFeedback.notificationOccurred('error');
                    document.getElementById('result-slot').style.borderColor = "#ff0000";
                }
                updateUI();
            }, 1500);
        }

        // При запуску оновлюємо баланс
        updateUI();
    </script>
</body>
</html>
