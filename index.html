<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1118;
            --panel-bg: #1a1d26;
            --accent-yellow: #f1b32d;
            --text-gray: #8b95a5;
            --success-green: #2ecc71;
            --error-red: #e74c3c;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Exo 2', sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        /* Шапка як у мінувальника */
        .header {
            width: 100%; max-width: 400px;
            display: flex; justify-content: space-between;
            background: var(--panel-bg); padding: 15px;
            border-radius: 12px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .stat-box { display: flex; flex-direction: column; }
        .label { color: var(--text-gray); font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .val { font-size: 20px; font-weight: 900; }
        .yellow { color: var(--accent-yellow); }

        /* КОЛЕСО */
        .wheel-area {
            position: relative; width: 260px; height: 260px;
            margin: 20px 0;
        }

        .static-wheel {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #1e222d 40%, #12151e 100%);
            border: 8px solid var(--panel-bg);
            position: relative; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Жовтий сектор (Шанс) */
        #chance-sector {
            position: absolute; width: 100%; height: 100%;
            background: conic-gradient(var(--accent-yellow) 0deg, transparent 0deg);
            opacity: 0.2;
        }

        /* СТРІЛКА, яка буде крутитися */
        #arrow-container {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            transition: transform 3.5s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .arrow-head {
            position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%);
            width: 20px; height: 30px;
            background: var(--accent-yellow);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            filter: drop-shadow(0 0 5px var(--accent-yellow));
        }

        .center-display {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100px; height: 100px;
            background: var(--panel-bg);
            border: 4px solid #252a36;
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 11;
        }

        /* Контролери */
        .controls { width: 100%; max-width: 400px; }
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        
        .opt-btn {
            background: var(--panel-bg); border: 1px solid #2d323e;
            color: white; padding: 12px; border-radius: 8px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .opt-btn.active { border-color: var(--accent-yellow); color: var(--accent-yellow); background: rgba(241, 179, 45, 0.1); }

        .input-wrap {
            background: var(--panel-bg); border-radius: 12px;
            padding: 15px; margin-bottom: 15px; text-align: center;
        }
        input {
            background: transparent; border: none; color: white;
            font-size: 26px; font-weight: 900; width: 100%; outline: none;
            text-align: center;
        }

        .btn-go {
            width: 100%; background: var(--accent-yellow);
            border: none; padding: 20px; border-radius: 12px;
            color: #000; font-size: 18px; font-weight: 900;
            text-transform: uppercase; cursor: pointer;
            transition: 0.2s;
        }
        .btn-go:active { transform: scale(0.98); opacity: 0.8; }
        .btn-go:disabled { background: #444; color: #888; cursor: not-allowed; }

        #result-text {
            margin-top: 10px; font-weight: 700; height: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="stat-box">
            <span class="label">Баланс</span>
            <span class="val yellow" id="balance-display">0 ₴</span>
        </div>
        <div class="stat-box" style="text-align: right;">
            <span class="label">Можливий виграш</span>
            <span class="val" id="potential-win" style="color: var(--success-green);">0 ₴</span>
        </div>
    </div>

    <div class="wheel-area">
        <div class="static-wheel">
            <div id="chance-sector"></div>
        </div>
        <div id="arrow-container">
            <div class="arrow-head"></div>
        </div>
        <div class="center-display">
            <div id="chance-text" style="font-size: 26px; font-weight: 900; color: var(--accent-yellow);">50%</div>
            <div class="label" style="font-size: 8px;">шанс</div>
        </div>
    </div>

    <div id="result-text"></div>

    <div class="controls">
        <div class="grid-btns">
            <button class="opt-btn" onclick="updateChance(25, this)">25%</button>
            <button class="opt-btn active" onclick="updateChance(50, this)">50%</button>
            <button class="opt-btn" onclick="updateChance(75, this)">75%</button>
        </div>

        <div class="input-wrap">
            <input type="number" id="bet-input" value="100" oninput="calcWin()">
        </div>

        <button class="btn-go" id="spin-btn" onclick="handleSpin()">Покращити</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseInt(localStorage.getItem('total_balance')) || 1000;
        let currentChance = 0.5;
        let isSpinning = false;
        let currentRotation = 0;

        function updateDisplay() {
            document.getElementById('balance-display').innerText = balance + " ₴";
            localStorage.setItem('total_balance', balance);
            
            // Оновлення жовтого сектора
            const deg = currentChance * 360;
            document.getElementById('chance-sector').style.background = 
                `conic-gradient(var(--accent-yellow) 0deg ${deg}deg, transparent ${deg}deg 360deg)`;
            
            document.getElementById('chance-text').innerText = (currentChance * 100) + "%";
            calcWin();
        }

        function calcWin() {
            const bet = parseInt(document.getElementById('bet-input').value) || 0;
            const win = Math.floor(bet * (1 / currentChance) * 0.95);
            document.getElementById('potential-win').innerText = win + " ₴";
        }

        function updateChance(val, btn) {
            if(isSpinning) return;
            currentChance = val / 100;
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateDisplay();
            tg.HapticFeedback.impactOccurred('light');
        }

        function handleSpin() {
            const bet = parseInt(document.getElementById('bet-input').value);
            if(bet > balance || bet <= 0 || isSpinning) return;

            balance -= bet;
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('result-text').innerText = "";
            updateDisplay();

            const isWin = Math.random() < currentChance;
            const arrow = document.getElementById('arrow-container');
            
            // Розрахунок кута:
            // 0 градусів - це початок жовтого сектора (верх)
            // Жовтий сектор йде від 0 до (currentChance * 360)
            let targetDeg;
            if(isWin) {
                targetDeg = Math.random() * (currentChance * 360 * 0.9); // Трохи відступаємо від країв
            } else {
                targetDeg = (currentChance * 360) + (Math.random() * (360 - currentChance * 360) * 0.9);
            }

            // Додаємо 5 повних обертів + цільовий кут
            const totalSpin = currentRotation + (360 * 5) + targetDeg;
            currentRotation = totalSpin;
            
            arrow.style.transform = `rotate(${totalSpin}deg)`;
            tg.HapticFeedback.impactOccurred('medium');

            setTimeout(() => {
                isSpinning = false;
                document.getElementById('spin-btn').disabled = false;
                
                if(isWin) {
                    const prize = Math.floor(bet * (1 / currentChance) * 0.95);
                    balance += prize;
                    document.getElementById('result-text').innerText = "ВИГРАШ! 🎉";
                    document.getElementById('result-text').style.color = "var(--success-green)";
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    document.getElementById('result-text').innerText = "ПРОГРАШ ✘";
                    document.getElementById('result-text').style.color = "var(--error-red)";
                    tg.HapticFeedback.notificationOccurred('error');
                }
                updateDisplay();
            }, 3600);
        }

        updateDisplay();
    </script>
</body>
</html>
