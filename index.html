<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0a0b10;
            --bg-panel: #161922;
            --accent-yellow: #f1b32d;
            --text-main: #ffffff;
            --text-muted: #626d7a;
            --win-color: #2ecc71;
            --lose-color: #e74c3c;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Exo 2', sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .history-bar {
            width: 100%; max-width: 400px;
            display: flex; gap: 6px; justify-content: center;
            margin-bottom: 15px; height: 30px;
        }
        .hist-chip {
            padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800;
            background: var(--bg-panel); border: 1px solid rgba(255,255,255,0.05);
        }
        .hist-win { color: var(--win-color); border-color: var(--win-color); }
        .hist-lose { color: var(--lose-color); border-color: var(--lose-color); }

        .stats-header {
            width: 100%; max-width: 400px;
            display: flex; justify-content: space-between;
            background: var(--bg-panel); padding: 15px 20px;
            border-radius: 12px; margin-bottom: 20px; box-sizing: border-box;
        }
        .stat-group { display: flex; flex-direction: column; }
        .stat-label { color: var(--text-muted); font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .stat-val { font-size: 22px; font-weight: 900; }
        .yellow-text { color: var(--accent-yellow); }

        .game-container {
            position: relative; width: 260px; height: 260px; margin-bottom: 30px;
        }
        .wheel-base {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, #1c202b 0%, #11141b 100%);
            border: 6px solid #1e222d; position: relative; overflow: hidden;
        }
        #sector-visual {
            position: absolute; width: 100%; height: 100%;
            background: conic-gradient(var(--accent-yellow) 0deg, transparent 0deg);
            opacity: 0.15;
        }
        #arrow-pivot {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; transition: transform 3.5s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .arrow-head {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 30px; background: var(--accent-yellow);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
        }
        .center-hub {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; background: var(--bg-panel);
            border: 4px solid #252a36; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 11;
        }

        .controls { width: 100%; max-width: 400px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn-opt {
            background: var(--bg-panel); border: 1px solid #2d323e;
            color: white; padding: 14px; border-radius: 10px; font-weight: 800; cursor: pointer;
        }
        .btn-opt.active { border-color: var(--accent-yellow); color: var(--accent-yellow); }

        .input-wrap {
            background: var(--bg-panel); border-radius: 12px; padding: 16px; margin-bottom: 15px;
        }
        input {
            background: transparent; border: none; color: white; font-size: 28px;
            font-weight: 900; width: 100%; text-align: center; outline: none;
        }

        .btn-main {
            width: 100%; background: var(--accent-yellow); border: none;
            padding: 20px; border-radius: 12px; color: #000; font-size: 18px;
            font-weight: 900; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 4px 0 #b38000;
        }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 #b38000; }
        .btn-main:disabled { background: #333; color: #666; box-shadow: none; }

        #msg { font-weight: 800; height: 24px; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="history-bar" id="history"></div>

    <div class="stats-header">
        <div class="stat-group">
            <span class="stat-label">Баланс</span>
            <span class="stat-val yellow-text" id="ui-bal">0 ₴</span>
        </div>
        <div class="stat-group" style="text-align: right;">
            <span class="stat-label">Приз</span>
            <span class="stat-val" id="ui-prize" style="color: var(--win-color);">0 ₴</span>
        </div>
    </div>

    <div class="game-container">
        <div class="wheel-base"><div id="sector-visual"></div></div>
        <div id="arrow-pivot"><div class="arrow-head"></div></div>
        <div class="center-hub">
            <div id="ui-perc" style="font-size: 30px; font-weight: 900; color: var(--accent-yellow);">50%</div>
            <div class="stat-label" style="font-size: 8px;">шанс</div>
        </div>
    </div>

    <div id="msg"></div>

    <div class="controls">
        <div class="grid-3">
            <button class="btn-opt" onclick="setChance(25, this)">25%</button>
            <button class="btn-opt active" onclick="setChance(50, this)">50%</button>
            <button class="btn-opt" onclick="setChance(75, this)">75%</button>
        </div>
        <div class="input-wrap">
            <input type="number" id="bet" value="100" oninput="render()">
        </div>
        <button class="btn-main" id="go" onclick="spin()">Покращити</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let balance = parseInt(localStorage.getItem('total_balance')) || 1000;
        let chance = 0.5;
        let spinning = false;
        let lastRotation = 0;

        function render() {
            document.getElementById('ui-bal').innerText = balance + " ₴";
            localStorage.setItem('total_balance', balance);
            
            document.getElementById('sector-visual').style.background = 
                `conic-gradient(var(--accent-yellow) 0deg ${chance * 360}deg, transparent 0deg)`;
            document.getElementById('ui-perc').innerText = (chance * 100) + "%";
            
            const b = parseInt(document.getElementById('bet').value) || 0;
            document.getElementById('ui-prize').innerText = Math.floor(b * (1/chance) * 0.95) + " ₴";
        }

        function setChance(v, el) {
            if(spinning) return;
            chance = v/100;
            document.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            render();
            tg.HapticFeedback.impactOccurred('light');
        }

        function spin() {
            const b = parseInt(document.getElementById('bet').value);
            if(b > balance || b <= 0 || spinning) return;

            balance -= b;
            spinning = true;
            document.getElementById('go').disabled = true;
            document.getElementById('msg').innerText = "";
            render();

            const win = Math.random() < chance;
            const pivot = document.getElementById('arrow-pivot');
            
            // Розрахунок кута: Жовтий сектор 0 -> (chance * 360)
            let stop;
            if(win) {
                stop = Math.random() * (chance * 360 * 0.9) + (chance * 360 * 0.05);
            } else {
                stop = (chance * 360) + Math.random() * ((360 - (chance * 360)) * 0.9) + 5;
            }

            // Крутимо мінімум 6 повних обертів + кут
            const total = lastRotation + (360 * 6) + (360 - (lastRotation % 360)) + stop;
            lastRotation = total;
            
            pivot.style.transform = `rotate(${total}deg)`;
            tg.HapticFeedback.impactOccurred('medium');

            setTimeout(() => {
                spinning = false;
                document.getElementById('go').disabled = false;
                if(win) {
                    const p = Math.floor(b * (1/chance) * 0.95);
                    balance += p;
                    document.getElementById('msg').innerText = "УСПІХ! + " + p + " ₴";
                    document.getElementById('msg').style.color = "var(--win-color)";
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    document.getElementById('msg').innerText = "ПРОГРАШ";
                    document.getElementById('msg').style.color = "var(--lose-color)";
                    tg.HapticFeedback.notificationOccurred('error');
                }
                
                const h = document.getElementById('history');
                const c = document.createElement('div');
                c.className = `hist-chip ${win?'hist-win':'hist-lose'}`;
                c.innerText = win?'WIN':'LOSE';
                h.prepend(c);
                if(h.children.length > 6) h.lastChild.remove();
                
                render();
            }, 3600);
        }
        render();
    </script>
</body>
</html>
