<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cb-bg: #0e121b;
            --cb-panel: #161b28;
            --cb-accent: #ffb700; /* Золото */
            --cb-blue: #2c71ff;
            --success: #2ecc71;
            --error: #e74c3c;
        }

        body {
            background-color: var(--cb-bg);
            color: white;
            font-family: 'Exo 2', sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Шапка */
        .header {
            width: 100%; max-width: 400px;
            display: flex; justify-content: space-between;
            background: var(--cb-panel); padding: 15px;
            border-radius: 12px; border-bottom: 3px solid var(--cb-accent);
            margin-bottom: 20px; box-sizing: border-box;
        }

        /* Історія */
        .history {
            display: flex; gap: 8px; margin-bottom: 20px;
            width: 100%; max-width: 400px; justify-content: center;
        }
        .hist-item {
            padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 700;
            background: var(--cb-panel); border: 1px solid rgba(255,255,255,0.1);
        }
        .win { color: var(--success); border-color: var(--success); }
        .lose { color: var(--error); border-color: var(--error); }

        /* КОЛЕСО УДАЧІ */
        .wheel-outer {
            position: relative; width: 250px; height: 250px;
            margin-bottom: 30px;
        }

        /* Стрілка-вказівник */
        .wheel-arrow {
            position: absolute; top: -15px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid var(--cb-accent);
            z-index: 10;
        }

        /* Саме колесо, яке крутиться */
        .wheel-container {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 5px solid var(--cb-panel);
            background: radial-gradient(circle, #2c3e50, #000);
            box-shadow: 0 0 30px rgba(255, 183, 0, 0.2);
            transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1);
            position: relative;
            overflow: hidden;
        }

        /* Розділи колеса (малюємо через CSS) */
        .wheel-sector {
            position: absolute; width: 50%; height: 50%;
            top: 0; left: 50%;
            transform-origin: 0% 100%;
        }

        /* Центральне коло з відсотками */
        .wheel-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90px; height: 90px;
            border-radius: 50%;
            background: #1c2331;
            border: 3px solid var(--cb-accent);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 5;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        /* Керування */
        .controls { width: 100%; max-width: 400px; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .c-btn {
            background: var(--cb-panel); border: 1px solid #283044; color: white;
            padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer;
        }
        .c-btn.active { border-color: var(--cb-accent); color: var(--cb-accent); background: rgba(255, 183, 0, 0.05); }

        input {
            width: 100%; background: #0e121b; border: 1px solid #283044;
            border-radius: 12px; padding: 18px; color: white; text-align: center;
            font-size: 24px; font-weight: 900; margin-bottom: 15px; box-sizing: border-box;
        }

        .btn-main {
            width: 100%;
            background: linear-gradient(180deg, #ffca43 0%, #ffb700 100%);
            border: none; padding: 20px; border-radius: 12px;
            color: #4e3800; font-size: 18px; font-weight: 900;
            text-transform: uppercase; cursor: pointer;
            box-shadow: 0 4px 0 #b38000;
        }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 #b38000; }
        .disabled { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <div><div style="font-size: 10px; color: #888;">БАЛАНС</div><div id="bal" style="font-size: 22px; font-weight: 900; color: var(--cb-accent);">0</div></div>
        <div style="text-align: right;"><div style="font-size: 10px; color: #888;">ВИГРАШ</div><div id="cur-bet" style="font-size: 22px; font-weight: 900; color: var(--success);">0</div></div>
    </div>

    <div class="history" id="history"></div>

    <div class="wheel-outer">
        <div class="wheel-arrow"></div>
        <div id="wheel" class="wheel-container">
            </div>
        <div class="wheel-center">
            <div id="perc-val" style="font-size: 28px; font-weight: 900; color: var(--cb-accent);">50%</div>
            <div style="font-size: 9px; color: #888; letter-spacing: 1px;">ШАНС</div>
        </div>
    </div>

    <div class="controls">
        <div class="btn-grid">
            <button class="c-btn" onclick="setChance(25, this)">25%</button>
            <button class="c-btn active" onclick="setChance(50, this)">50%</button>
            <button class="c-btn" onclick="setChance(75, this)">75%</button>
        </div>
        
        <input type="number" id="betField" value="100" oninput="updateUI()">

        <button class="btn-main" id="go" onclick="run()">Покращити</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseInt(localStorage.getItem('total_balance')) || 1000;
        let chance = 0.5;
        let isSpinning = false;
        let currentRotation = 0;

        function updateUI() {
            document.getElementById('bal').innerText = balance + " ₴";
            const bet = parseInt(document.getElementById('betField').value) || 0;
            const prize = Math.floor(bet * (1/chance) * 0.95);
            document.getElementById('cur-bet').innerText = prize + " ₴";
            document.getElementById('perc-val').innerText = (chance * 100) + "%";
            
            drawWheel();
            localStorage.setItem('total_balance', balance);
        }

        function setChance(val, el) {
            if (isSpinning) return;
            chance = val / 100;
            document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }

        // Малюємо сектори колеса (виграш/програш)
        function drawWheel() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = ''; // Очистити
            const winAngle = chance * 360;
            const loseAngle = 360 - winAngle;

            // Зелений сектор (Виграш)
            const winSec = document.createElement('div');
            winSec.style.cssText = `
                position: absolute; width: 100%; height: 100%;
                background: conic-gradient(#2ecc7133 0deg ${winAngle}deg, transparent ${winAngle}deg 360deg);
            `;
            wheel.appendChild(winSec);

            // Додаємо лінію розділу
            const line = document.createElement('div');
            line.style.cssText = `
                position: absolute; top: 0; left: 50%; width: 2px; height: 50%;
                background: var(--cb-accent); transform-origin: 50% 100%;
                transform: translateX(-50%) rotate(${winAngle}deg);
            `;
            wheel.appendChild(line);
        }

        function addHist(win, c) {
            const h = document.getElementById('history');
            const i = document.createElement('div');
            i.className = `hist-item ${win?'win':'lose'}`;
            i.innerText = `${win?'✔':'✘'} ${c*100}%`;
            h.prepend(i);
            if(h.children.length > 5) h.lastChild.remove();
        }

        function run() {
            const bet = parseInt(document.getElementById('betField').value);
            if(bet > balance || bet <= 0 || isSpinning) return;

            balance -= bet;
            isSpinning = true;
            updateUI();

            const btn = document.getElementById('go');
            const wheel = document.getElementById('wheel');
            btn.classList.add('disabled');

            // Розрахунок результату (виграш/програш)
            const isWin = Math.random() < chance;
            
            // Розрахунок кута зупинки (0 градусів — стрілка вказує вгору)
            // Зелений сектор завжди починається від 0. 
            // Отже, для виграшу треба зупинитися між 0 та (chance * 360).
            let stopAngle;
            if(isWin) {
                // Випадковий кут усередині зеленого сектора
                stopAngle = Math.random() * (chance * 360);
            } else {
                // Випадковий кут усередині чорного сектора
                stopAngle = (chance * 360) + (Math.random() * (360 - (chance * 360)));
            }

            // Додаємо 5 повних обертів для краси
            const finalRotation = currentRotation + (360 * 5) + (360 - stopAngle);
            currentRotation = finalRotation;
            
            // Запуск анімації
            wheel.style.transform = `rotate(${finalRotation}deg)`;
            tg.HapticFeedback.impactOccurred('medium');

            setTimeout(() => {
                isSpinning = false;
                btn.classList.remove('disabled');
                
                if(isWin) {
                    const prize = Math.floor(bet * (1/chance) * 0.95);
                    balance += prize;
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    tg.HapticFeedback.notificationOccurred('error');
                }
                addHist(isWin, chance);
                updateUI();
            }, 4000); // Час анімації в CSS (transition)
        }

        updateUI();
    </script>
</body>
</html>
