<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cb-bg: #0e121b;
            --cb-panel: #161b28;
            --cb-accent: #ffb700;
            --cb-blue: #2c71ff;
            --success: #2ecc71;
            --error: #e74c3c;
        }

        body {
            background-color: var(--cb-bg);
            color: white;
            font-family: 'Exo 2', sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Шапка */
        .header {
            width: 100%; max-width: 400px;
            display: flex; justify-content: space-between;
            background: var(--cb-panel); padding: 15px;
            border-radius: 12px; border-bottom: 3px solid var(--cb-accent);
            margin-bottom: 10px; box-sizing: border-box;
        }

        /* Історія ігор */
        .history {
            display: flex; gap: 8px; margin-bottom: 15px;
            width: 100%; max-width: 400px; justify-content: center;
            overflow: hidden;
        }
        .hist-item {
            padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 700;
            background: var(--cb-panel); border: 1px solid rgba(255,255,255,0.1);
        }
        .win { color: var(--success); border-color: var(--success); }
        .lose { color: var(--error); border-color: var(--error); }

        /* Центральне КОЛО */
        .circle-container {
            position: relative; width: 180px; height: 180px;
            margin: 20px 0; display: flex; align-items: center; justify-content: center;
        }
        svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        circle {
            fill: none; stroke-width: 8; stroke-linecap: round;
        }
        .circle-bg { stroke: rgba(255,255,255,0.05); }
        .circle-progress {
            stroke: var(--cb-accent);
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 0.5s ease;
        }
        .circle-text {
            position: absolute; text-align: center;
        }
        .circle-text div:first-child { font-size: 32px; font-weight: 900; color: var(--cb-accent); }

        /* Слоти */
        .slots-row {
            display: flex; gap: 20px; align-items: center; margin-bottom: 20px;
        }
        .slot {
            width: 80px; height: 80px; background: var(--cb-panel);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
        }
        .slot img { width: 70%; }

        /* Кнопки та інпут */
        .controls { width: 100%; max-width: 400px; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .c-btn {
            background: var(--cb-panel); border: 1px solid #283044; color: white;
            padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer;
        }
        .c-btn.active { border-color: var(--cb-accent); color: var(--cb-accent); }

        input {
            width: 100%; background: #0e121b; border: 1px solid #283044;
            border-radius: 12px; padding: 15px; color: white; text-align: center;
            font-size: 20px; font-weight: 900; margin-bottom: 15px; box-sizing: border-box;
        }

        .btn-main {
            width: 100%; background: linear-gradient(180deg, #ffca43 0%, #ffb700 100%);
            border: none; padding: 18px; border-radius: 12px; color: #4e3800;
            font-size: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer;
        }
        
        .anim-spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div><div style="font-size: 10px; color: #888;">БАЛАНС</div><div id="bal" style="font-size: 20px; font-weight: 900; color: var(--cb-accent);">0</div></div>
        <div style="text-align: right;"><div style="font-size: 10px; color: #888;">СТАВКА</div><div id="cur-bet" style="font-size: 20px; font-weight: 900;">0</div></div>
    </div>

    <div class="history" id="history">
        </div>

    <div class="slots-row">
        <div class="slot"><img src="https://community.akamai.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhjx2jJemkV09-5lpKKqPrxN7LEmyVQ7MEpiO_E57P5gVO8v11rNWD6LITAdgY9M13W-VS6k-vvgZ_v75jMmyE26ygh4X6InhK-n1gSOat_sh_V"></div>
        <div style="color: var(--cb-accent); font-size: 24px;">⚡</div>
        <div class="slot" id="out-slot"><span style="font-size: 24px; opacity: 0.2;">?</span></div>
    </div>

    <div class="circle-container">
        <svg viewBox="0 0 160 160">
            <circle class="circle-bg" cx="80" cy="80" r="70"></circle>
            <circle id="prog" class="circle-progress" cx="80" cy="80" r="70"></circle>
        </svg>
        <div class="circle-text">
            <div id="perc-val">50%</div>
            <div style="font-size: 10px; color: #888; letter-spacing: 2px;">ШАНС</div>
        </div>
    </div>

    <div class="controls">
        <div class="btn-grid">
            <button class="c-btn" onclick="setChance(25, this)">25%</button>
            <button class="c-btn active" onclick="setChance(50, this)">50%</button>
            <button class="c-btn" onclick="setChance(75, this)">75%</button>
        </div>
        
        <input type="number" id="betField" value="100" oninput="updateBetDisplay()">

        <button class="btn-main" id="go" onclick="run()">Покращити</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseInt(localStorage.getItem('total_balance')) || 1000;
        let chance = 0.5;

        function updateUI() {
            document.getElementById('bal').innerText = balance + " ₴";
            document.getElementById('cur-bet').innerText = document.getElementById('betField').value + " ₴";
            localStorage.setItem('total_balance', balance);
            
            // Оновлення кола
            const circle = document.getElementById('prog');
            const offset = 440 - (440 * (chance * 100)) / 100;
            circle.style.strokeDashoffset = offset;
            document.getElementById('perc-val').innerText = (chance * 100) + "%";
        }

        function setChance(val, el) {
            chance = val / 100;
            document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateBetDisplay() {
            document.getElementById('cur-bet').innerText = document.getElementById('betField').value + " ₴";
        }

        function addHist(win, c) {
            const h = document.getElementById('history');
            const i = document.createElement('div');
            i.className = `hist-item ${win?'win':'lose'}`;
            i.innerText = `${win?'✔':'✘'} ${c*100}%`;
            h.prepend(i);
            if(h.children.length > 5) h.lastChild.remove();
        }

        function run() {
            const bet = parseInt(document.getElementById('betField').value);
            if(bet > balance || bet <= 0) return;

            balance -= bet;
            updateUI();

            const btn = document.getElementById('go');
            const prog = document.getElementById('prog');
            btn.disabled = true;
            prog.classList.add('anim-spin');

            setTimeout(() => {
                prog.classList.remove('anim-spin');
                btn.disabled = false;
                
                const isWin = Math.random() < chance;
                if(isWin) {
                    const prize = Math.floor(bet * (1/chance) * 0.95);
                    balance += prize;
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    tg.HapticFeedback.notificationOccurred('error');
                }
                addHist(isWin, chance);
                updateUI();
            }, 1200);
        }

        updateUI();
    </script>
</body>
</html>
